<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRS 記憶助手 - 飛書實時版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        body, html { height: 100vh; margin: 0; background-color: #f8fafc; overflow: hidden; user-select: none; }
        #root { height: 100%; }
        .card-grid-layout { display: grid; grid-template-rows: 3.2fr 2.3fr 1.1fr 1.1fr 1.1fr auto; height: 100%; }
        @media (max-width: 640px) { .card-grid-layout { grid-template-rows: 2.8fr 2.5fr 0.8fr 0.8fr 0.8fr auto; } }
        .animate-pop { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // ========================================================
        // 🛠️ 請在此填寫你的飛書參數
        // ========================================================
        const LARK_CONFIG = {
            APP_ID: 'cli_a97f5cbca1389e15',     // 替換為你的 App ID
            APP_SECRET: 'dZwAHFAwFdxMBN3ax84QGcct6rB1QGeJ', // 替換為你的 App Secret
            APP_TOKEN: 'Fwr9bVucfaWRNQsmN0wjEfXqpSR', // 替換為多維表格的 App Token
            TABLE_ID: 'tblVMg0ADZPVV3WB'      // 替換為資料表的 Table ID
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px" class="${className}"></i>`;
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [originalCards, setOriginalCards] = useState([]);
            const [queue, setQueue] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [isFinished, setIsFinished] = useState(false);
            const [totalCount, setTotalCount] = useState(0);
            const [loading, setLoading] = useState(false);

            const speak = useCallback((text) => {
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = /[\u4e00-\u9fa5]/.test(text) ? 'zh-TW' : 'en-US';
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }, []);

            // 🚀 從飛書讀取數據
            const syncFromLark = async () => {
                setLoading(true);
                try {
                    // Step 1: 獲取臨時訪問權限 (Tenant Access Token)
                    const authRes = await fetch('https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            app_id: LARK_CONFIG.APP_ID,
                            app_secret: LARK_CONFIG.APP_SECRET
                        })
                    });
                    const authData = await authRes.json();
                    if (!authData.tenant_access_token) throw new Error('飛書授權失敗，請檢查 APP_ID/SECRET');

                    // Step 2: 請求多維表格的所有紀錄
                    const recordsRes = await fetch(`https://open.feishu.cn/open-apis/bitable/v1/apps/${LARK_CONFIG.APP_TOKEN}/tables/${LARK_CONFIG.TABLE_ID}/records?page_size=500`, {
                        headers: {
                            'Authorization': `Bearer ${authData.tenant_access_token}`
                        }
                    });
                    const recordsData = await recordsRes.json();
                    
                    if (recordsData.code !== 0) throw new Error(recordsData.msg || '無法讀取表格內容');

                    const items = recordsData.data.items || [];
                    const parsed = items.map(item => ({
                        id: item.record_id,
                        word: item.fields["單詞"] || 'Empty',
                        pos: item.fields["詞性"] || '',
                        translation: item.fields["中文翻譯"] || '',
                        inflection: item.fields["詞性變化"] || '',
                        collocation: item.fields["搭配詞"] || '',
                        example: item.fields["例句"] || ''
                    })).filter(c => c.word !== 'Empty');

                    if (parsed.length === 0) throw new Error('表格裡空空如也，快去填寫單字吧！');

                    setOriginalCards(parsed);
                    setQueue([...parsed].sort(() => Math.random() - 0.5)); // 隨機洗牌
                    setTotalCount(parsed.length);
                    setIsFinished(false);
                    setIsFlipped(false);
                } catch (error) {
                    console.error(error);
                    alert('❌ 同步失敗: ' + error.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleSRS = useCallback((type) => {
                const [head, ...tail] = queue;
                let newQueue = [...tail];
                if (type === 'again') newQueue.splice(1, 0, head); // 很快再次出現
                else if (type === 'hard') newQueue.splice(Math.min(5, newQueue.length), 0, head); // 稍後出現
                
                if (newQueue.length === 0) setIsFinished(true);
                else { setQueue(newQueue); setIsFlipped(false); }
            }, [queue]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isFinished || queue.length === 0) return;
                    if (e.code === 'Space') { e.preventDefault(); setIsFlipped(!isFlipped); }
                    if (isFlipped && ['1','2','3','4'].includes(e.key)) {
                        handleSRS(['again', 'hard', 'good', 'easy'][parseInt(e.key)-1]);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isFlipped, isFinished, queue, handleSRS]);

            const progress = totalCount > 0 ? ((totalCount - queue.length) / totalCount) * 100 : 0;
            const currentCard = queue[0];

            if (isFinished) {
                return (
                    <div className="h-full flex items-center justify-center p-6 bg-slate-50">
                        <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl max-w-md w-full text-center border-4 border-indigo-100 animate-pop">
                            <Icon name="party-popper" size={80} className="text-indigo-500 mx-auto mb-6" />
                            <h2 className="text-4xl font-black mb-4 text-slate-800">複習完成！</h2>
                            <p className="text-slate-400 mb-8">所有的飛書單字都已消化完畢。</p>
                            <button onClick={() => setQueue([...originalCards])} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black shadow-xl shadow-indigo-200">再次啟動</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full flex flex-col p-6 max-w-4xl mx-auto">
                    {/* Top UI */}
                    <div className="flex-none flex justify-between items-center mb-6">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg"><Icon name="database" className="text-white" /></div>
                            <span className="text-2xl font-black text-slate-800 tracking-tighter">LARK SRS</span>
                        </div>
                        <button onClick={syncFromLark} disabled={loading} className="px-6 py-3 bg-indigo-600 text-white rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-indigo-100 disabled:bg-slate-300">
                            <Icon name={loading ? "loader-2" : "refresh-cw"} className={loading ? "animate-spin" : ""} size={18} />
                            {loading ? "讀取中..." : "同步飛書"}
                        </button>
                    </div>

                    <div className="flex-1 flex flex-col justify-center items-center w-full min-h-0">
                        {queue.length > 0 ? (
                            <div className="w-full max-w-xl h-full flex flex-col min-h-0">
                                <div className="mb-4">
                                    <div className="flex justify-between mb-2"><span className="text-[10px] font-black text-slate-300 tracking-widest">PROGRESS</span><span className="text-xs text-indigo-500 font-black">{totalCount - queue.length} / {totalCount}</span></div>
                                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden border border-white"><div className="bg-indigo-500 h-full transition-all duration-700" style={{ width: `${progress}%` }}></div></div>
                                </div>
                                
                                <div className="flex-1 relative perspective-1000 mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`relative w-full h-full cursor-pointer transition-all duration-700 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                                        {/* 正面 */}
                                        <div className="absolute w-full h-full backface-hidden bg-white rounded-[4rem] shadow-2xl flex flex-col items-center justify-center p-12 border border-white/50">
                                            <h2 className="text-7xl font-black text-slate-800 mb-10 tracking-tighter text-center break-words">{currentCard.word}</h2>
                                            <button onClick={(e) => { e.stopPropagation(); speak(currentCard.word); }} className="w-20 h-20 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center hover:scale-110 transition-transform"><Icon name="mic-2" size={30}/></button>
                                            <p className="absolute bottom-10 text-[10px] font-black text-slate-200 tracking-widest">TAP TO REVEAL</p>
                                        </div>

                                        {/* 反面 */}
                                        <div className="absolute w-full h-full backface-hidden bg-white rounded-[4rem] rotate-y-180 flex flex-col shadow-2xl border border-white overflow-hidden">
                                            <div className="card-grid-layout">
                                                <div className="bg-slate-200 overflow-hidden"><img src={`https://loremflickr.com/800/600/${encodeURIComponent(currentCard.word)}`} className="w-full h-full object-cover" /></div>
                                                <div className="px-10 py-6"><span className="px-2 py-1 bg-indigo-600 text-white text-[10px] font-black rounded mb-2 inline-block uppercase">{currentCard.pos}</span><h3 className="text-4xl font-black text-slate-800">{currentCard.translation}</h3></div>
                                                <div className="px-10 border-t border-slate-50 flex items-center text-sm"><span className="text-[9px] font-black text-slate-300 w-24 uppercase tracking-tighter">Variations</span><span className="text-slate-600">{currentCard.inflection || 'N/A'}</span></div>
                                                <div className="px-10 border-t border-slate-50 flex items-center text-sm"><span className="text-[9px] font-black text-slate-300 w-24 uppercase tracking-tighter">Usage</span><span className="text-indigo-600 font-bold">{currentCard.collocation || 'N/A'}</span></div>
                                                <div className="px-10 border-t border-slate-50 flex items-center italic text-slate-500 text-[14px]">"{currentCard.example}"</div>
                                                <div className="p-6 bg-slate-50/50 grid grid-cols-4 gap-3" onClick={e => e.stopPropagation()}>
                                                    {['Again', 'Hard', 'Good', 'Easy'].map((l, i) => (
                                                        <button key={l} onClick={() => handleSRS(l.toLowerCase())} className="py-3 bg-white border border-slate-200 rounded-2xl flex flex-col items-center group active:scale-95 transition-all">
                                                            <span className="text-[10px] font-black uppercase text-indigo-500">{l}</span>
                                                            <span className="text-[9px] font-bold text-slate-300 group-hover:text-indigo-300">{i+1}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white p-20 rounded-[5rem] border-4 border-dashed border-slate-100 text-center max-w-lg shadow-sm">
                                <div className="w-24 h-24 bg-indigo-50 rounded-[3rem] flex items-center justify-center mx-auto mb-8"><Icon name="link-2" size={40} className="text-indigo-400" /></div>
                                <h3 className="text-2xl font-black text-slate-800 mb-2">連結至飛書數據</h3>
                                <p className="text-slate-400 text-sm mb-10">點擊上方按鈕開始同步您的多維表格單字庫</p>
                                <button onClick={syncFromLark} className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black text-lg shadow-xl shadow-indigo-100 active:scale-95 transition-all">立即同步</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
