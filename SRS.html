<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRS 記憶助手 - 雲端版</title>
    <!-- 針對行動裝置優化 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3406/3406828.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        
        body, html { 
            height: 100vh; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain;
            user-select: none; /* 防止長按文字跳出選單 */
        }
        #root { height: 100%; }
        
        .card-grid-layout {
            display: grid;
            grid-template-rows: 3.2fr 2.3fr 1fr 1fr 1fr auto;
            height: 100%;
        }

        @media (max-width: 640px) {
            .card-grid-layout {
                grid-template-rows: 2.8fr 2.5fr 0.8fr 0.8fr 0.8fr auto;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-pop { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* 隱藏卷軸 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const Icon = ({ name, size = 24, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px" class="${className}"></i>`;
                    window.lucide.createIcons({ attrs: { class: className }, nameAttr: 'data-lucide' });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className="inline-flex items-center justify-center" />;
        };

        const App = () => {
            const [originalCards, setOriginalCards] = useState([]);
            const [queue, setQueue] = useState([]);
            const [isFlipped, setIsFlipped] = useState(false);
            const [stats, setStats] = useState({ again: 0, hard: 0, good: 0, easy: 0 });
            const [isFinished, setIsFinished] = useState(false);
            const [totalCount, setTotalCount] = useState(0);
            const [loading, setLoading] = useState(false);

            // 圖片載入失敗時的回退機制
            const handleImgError = (e) => {
                e.target.src = "https://images.unsplash.com/photo-1546410531-bb4caa6b424d?q=80&w=1000&auto=format&fit=crop";
                e.target.className = "w-full h-full object-cover opacity-50 grayscale";
            };

            const getImageUrl = (word) => `https://loremflickr.com/800/600/${encodeURIComponent(word)}?lock=${word.length}`;

            const speak = useCallback((text, lang = 'en-US') => {
                if (!text || !window.speechSynthesis) return;
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                utterance.rate = 0.85;
                window.speechSynthesis.speak(utterance);
            }, []);

            const syncFromCloud = async () => {
                setLoading(true);
                // 這裡預留對接 Lark API 的位置
                setTimeout(() => {
                    const sampleData = [
                        { fields: { "單詞": "Efficiency", "詞性": "n.", "中文翻譯": "效率", "詞性變化": "efficient (adj.)", "搭配詞": "work efficiency", "例句": "We need to improve our work efficiency." } },
                        { fields: { "單詞": "Collaboration", "詞性": "n.", "中文翻譯": "合作", "詞性變化": "collaborate (v.)", "搭配詞": "team collaboration", "例句": "Close collaboration is key to success." } },
                        { fields: { "單詞": "Persist", "詞性": "v.", "中文翻譯": "堅持", "詞性變化": "persistence", "搭配詞": "persist in", "例句": "You must persist in your studies." } }
                    ];
                    const parsed = sampleData.map((item, idx) => ({
                        id: `cloud-${idx}-${Date.now()}`,
                        word: item.fields["單詞"],
                        pos: item.fields["詞性"],
                        translation: item.fields["中文翻譯"],
                        inflection: item.fields["詞性變化"],
                        collocation: item.fields["搭配詞"],
                        example: item.fields["例句"]
                    }));
                    startSession(parsed);
                    setLoading(false);
                }, 800);
            };

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    const rows = text.split('\n').filter(row => row.trim() !== '');
                    const parsedCards = rows.slice(1).map((row, index) => {
                        // 處理 CSV 的逗號切割邏輯
                        const parts = row.split(',').map(part => part.trim().replace(/^"|"$/g, ''));
                        return {
                            id: `local-${index}`,
                            word: parts[0] || '', pos: parts[1] || '', translation: parts[2] || '',
                            inflection: parts[3] || '', collocation: parts[4] || '', example: parts[5] || ''
                        };
                    });
                    if (parsedCards.length > 0) startSession(parsedCards);
                };
                reader.readAsText(file);
            };

            const startSession = (cards) => {
                setOriginalCards(cards);
                setQueue([...cards]);
                setTotalCount(cards.length);
                setStats({ again: 0, hard: 0, good: 0, easy: 0 });
                setIsFinished(false);
                setIsFlipped(false);
            };

            const handleSRS = useCallback((type) => {
                setStats(prev => ({ ...prev, [type]: prev[type] + 1 }));
                const [head, ...tail] = queue;
                let newQueue = [...tail];
                
                if (type === 'again') newQueue.splice(1, 0, head);
                else if (type === 'hard') newQueue.splice(Math.min(3, newQueue.length), 0, head);
                
                if (newQueue.length === 0) setIsFinished(true);
                else { setQueue(newQueue); setIsFlipped(false); }
            }, [queue]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isFinished || queue.length === 0) return;
                    if (e.code === 'Space') { e.preventDefault(); setIsFlipped(prev => !prev); }
                    if (isFlipped && ['1','2','3','4'].includes(e.key)) {
                        const types = ['again', 'hard', 'good', 'easy'];
                        handleSRS(types[parseInt(e.key)-1]);
                    }
                    if (e.key === 'Enter') speak(!isFlipped ? queue[0]?.word : queue[0]?.example);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isFlipped, isFinished, queue, handleSRS, speak]);

            const progress = totalCount > 0 ? ((totalCount - queue.length) / totalCount) * 100 : 0;
            const currentCard = queue[0];

            if (isFinished) {
                return (
                    <div className="h-full flex items-center justify-center p-6 bg-slate-50">
                        <div className="bg-white p-12 rounded-[3.5rem] shadow-2xl max-w-md w-full text-center animate-pop border border-white">
                            <Icon name="award" size={80} className="text-indigo-500 mx-auto mb-6" />
                            <h2 className="text-4xl font-black mb-4 text-slate-800 tracking-tight">今日任務達成！</h2>
                            <p className="text-slate-400 mb-10 font-medium">所有的單字都已經複習完畢。</p>
                            <button onClick={() => startSession(originalCards)} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">
                                重新開始
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full flex flex-col p-6 max-w-4xl mx-auto">
                    {/* Header */}
                    <div className="flex-none w-full flex justify-between items-center mb-6">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200">
                                <Icon name="graduation-cap" size={24} className="text-white" />
                            </div>
                            <span className="text-2xl font-black text-slate-800 tracking-tighter uppercase">SRS Cloud</span>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={syncFromCloud} disabled={loading} className="h-12 px-6 bg-indigo-50 text-indigo-700 rounded-2xl flex items-center gap-2 hover:bg-indigo-100 transition-all font-bold">
                                <Icon name={loading ? "loader-2" : "cloud-rain"} size={18} className={loading ? "animate-spin" : ""} />
                                {loading ? "同步中" : "雲端資料"}
                            </button>
                            <label className="w-12 h-12 bg-white border border-slate-200 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-50 transition-all shadow-sm">
                                <Icon name="plus" size={22} className="text-slate-400" />
                                <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                            </label>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col justify-center items-center w-full min-h-0">
                        {queue.length > 0 ? (
                            <div className="w-full max-w-xl h-full flex flex-col min-h-0 animate-pop">
                                {/* Progress */}
                                <div className="mb-6 px-1">
                                    <div className="flex justify-between items-end mb-2 font-black">
                                        <span className="text-[10px] text-slate-300 uppercase tracking-widest">Mastery Level</span>
                                        <span className="text-xs text-indigo-500">{totalCount - queue.length} / {totalCount}</span>
                                    </div>
                                    <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden border border-white">
                                        <div className="bg-indigo-500 h-full transition-all duration-1000" style={{ width: `${progress}%` }}></div>
                                    </div>
                                </div>

                                {/* Flashcard */}
                                <div className="flex-1 relative perspective-1000 min-h-0 mb-8" onClick={() => setIsFlipped(!isFlipped)}>
                                    <div className={`relative w-full h-full cursor-pointer transition-all duration-700 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                                        
                                        {/* Front */}
                                        <div className="absolute w-full h-full backface-hidden bg-white rounded-[4rem] shadow-2xl flex flex-col items-center justify-center p-12 border border-white/50">
                                            <div className="text-center">
                                                <h2 className="text-7xl font-black text-slate-800 mb-10 tracking-tighter leading-tight">{currentCard.word}</h2>
                                                <button onClick={(e) => { e.stopPropagation(); speak(currentCard.word); }} className="w-20 h-20 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center hover:bg-indigo-100 active:scale-90 transition-all shadow-sm">
                                                    <Icon name="mic-2" size={30} />
                                                </button>
                                            </div>
                                            <div className="absolute bottom-12 flex items-center gap-2 text-slate-200">
                                                <Icon name="hand" size={12} />
                                                <span className="text-[10px] font-black uppercase tracking-[0.4em]">點擊翻轉卡片</span>
                                            </div>
                                        </div>

                                        {/* Back */}
                                        <div className="absolute w-full h-full backface-hidden bg-white rounded-[4rem] rotate-y-180 flex flex-col shadow-2xl border border-white overflow-hidden">
                                            <div className="card-grid-layout">
                                                <div className="relative overflow-hidden bg-slate-200">
                                                    <img src={getImageUrl(currentCard.word)} onError={handleImgError} className="w-full h-full object-cover" />
                                                </div>

                                                <div className="px-10 py-6 flex flex-col justify-center">
                                                    <span className="w-fit px-3 py-1 bg-indigo-600 text-white text-[10px] font-black rounded-lg uppercase mb-2">{currentCard.pos}</span>
                                                    <h3 className="text-4xl font-black text-slate-800 tracking-tight leading-none">{currentCard.translation}</h3>
                                                </div>

                                                <div className="px-10 border-t border-slate-50 flex items-center text-sm">
                                                    <span className="text-[9px] font-black text-slate-300 uppercase w-28 tracking-widest">Variation</span>
                                                    <span className="text-slate-600 font-medium truncate">{currentCard.inflection || 'N/A'}</span>
                                                </div>

                                                <div className="px-10 border-t border-slate-50 flex items-center text-sm">
                                                    <span className="text-[9px] font-black text-slate-300 uppercase w-28 tracking-widest">Phrase</span>
                                                    <span className="text-indigo-600 font-bold truncate">{currentCard.collocation || 'N/A'}</span>
                                                </div>

                                                <div className="px-10 border-t border-slate-50 flex items-center relative">
                                                    <p className="text-[14px] text-slate-500 leading-snug italic line-clamp-2 pr-10">"{currentCard.example}"</p>
                                                    <button onClick={(e) => { e.stopPropagation(); speak(currentCard.example.split('(')[0]); }} className="absolute right-10 text-indigo-300 hover:text-indigo-600 transition-all">
                                                        <Icon name="volume-1" size={20} />
                                                    </button>
                                                </div>

                                                <div className="p-6 bg-slate-50/50" onClick={(e) => e.stopPropagation()}>
                                                    <div className="grid grid-cols-4 gap-3">
                                                        {[
                                                            { label: 'Again', key: '1', color: 'red' },
                                                            { label: 'Hard', key: '2', color: 'orange' },
                                                            { label: 'Good', key: '3', color: 'green' },
                                                            { label: 'Easy', key: '4', color: 'blue' }
                                                        ].map(btn => (
                                                            <button key={btn.label} onClick={() => handleSRS(btn.label.toLowerCase())} className="py-3 rounded-2xl bg-white border border-slate-200 shadow-sm flex flex-col items-center hover:bg-indigo-50 active:scale-95 transition-transform">
                                                                <span className={`text-[10px] font-black uppercase text-${btn.color}-500 mb-1`}>{btn.label}</span>
                                                                <span className="text-[10px] font-bold text-slate-300">{btn.key}</span>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white p-20 rounded-[5rem] border-4 border-dashed border-slate-100 text-center max-w-lg shadow-sm animate-pop">
                                <div className="w-28 h-28 bg-indigo-50 rounded-[3rem] flex items-center justify-center mx-auto mb-10">
                                    <Icon name="cloud-lightning" size={48} className="text-indigo-600" />
                                </div>
                                <h3 className="text-3xl font-black text-slate-800 mb-4 tracking-tight">準備開始</h3>
                                <p className="text-slate-400 text-sm mb-12 px-6">同步雲端資料庫獲取最新詞彙，或上傳您的單字本。</p>
                                <button onClick={syncFromCloud} className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all">同步雲端資料庫</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
